name: 🔍 Security & Dependencies Audit

on:
  push:
    branches: [ main ]
  # schedule:
  #   - cron: '0 8 * * MON'  
  # workflow_dispatch:  

jobs:
  audit:
    name: 🛡️ Audit Sécurité & Dépendances
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📂 Install dependencies
        run: npm ci

      # ✅ Vulnérabilités connues (CVE)
      - name: 🔐 npm audit (vulnérabilités)
        run: npm audit --audit-level=high
        continue-on-error: false  # Bloque si HIGH ou CRITICAL

      # ✅ Dépendances obsolètes
      - name: 📅 Check outdated packages
        run: |
          echo "## 📦 Dépendances obsolètes" >> $GITHUB_STEP_SUMMARY
          npm outdated || true  # Ne bloque pas mais affiche

      # ✅ Dépendances inutilisées
      - name: 🧹 Check unused dependencies (depcheck)
        run: |
          npx depcheck --json > depcheck-report.json || true
          echo "## 🧹 Dépendances inutilisées" >> $GITHUB_STEP_SUMMARY
          cat depcheck-report.json | npx json dependencies >> $GITHUB_STEP_SUMMARY || echo "Aucune dépendance inutilisée ✅" >> $GITHUB_STEP_SUMMARY

      # ✅ Licences (éviter les licences incompatibles)
      - name: 📜 Check licenses
        run: |
          npx license-checker --summary >> $GITHUB_STEP_SUMMARY || true

      # ✅ OWASP Dependency Check (analyse poussée CVE)
      - name: 🔎 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'poker-tracker'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
        continue-on-error: true  # Rapport sans bloquer

      - name: 📊 Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/
          retention-days: 30

      - name: 🚨 Créer une issue si vulnérabilité
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Vulnérabilité détectée - ' + new Date().toLocaleDateString(),
              body: 'Un audit de sécurité a détecté des vulnérabilités. Voir le run : ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              labels: ['security', 'dependencies']
            })
